<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Meta Lineup Filter</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <p id="status">Loading countries and filters…</p>

    <div id="app" hidden>
      <div id="filters"></div>

      <div class="results-header">
        <h2 class="results-heading">Possible matches</h2>
        <button id="compare-btn" type="button" hidden>⚖ What's different?</button>
        <button id="toggle-all" type="button">Collapse filters</button>
        <button id="clear-btn" type="button">Clear filters</button>
      </div>
      <div id="results-summary"></div>
      <ul id="results"></ul>
    </div>

    <div id="compare-overlay" hidden></div>

    <footer>
      <a href="https://guessr-meta-lineup.vercel.app" target="_blank" rel="noopener noreferrer"
        >See full clue details on Meta Lineup →</a
      >
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
