<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Meta Lineup Filter</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header>
      <img src="icons/icon48.png" alt="" width="24" height="24" />
      <h1>Meta Lineup Filter</h1>
    </header>

    <p id="status">Loading countries and filters…</p>

    <div id="app" hidden>
      <div id="results-summary"></div>
      <button id="clear-btn" type="button">Clear all filters</button>

      <div id="filters"></div>

      <h2 class="results-heading">Possible matches</h2>
      <ul id="results"></ul>
    </div>

    <footer>
      <a href="https://guessr-meta-lineup.vercel.app" target="_blank" rel="noopener noreferrer"
        >See full clue details on Meta Lineup →</a
      >
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
